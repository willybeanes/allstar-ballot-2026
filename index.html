<!DOCTYPE html>

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #e8e8e8;

    }

    .page-header {

      color: #fff;
      margin-bottom: 0.25rem;
    }

      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 1.75rem;
      font-size: 0.72rem;

    .legend-swatch { width: 22px; height: 5px; border-radius: 2px; }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      max-width: 960px;
      margin: 0 auto;
    }

    @media (max-width: 600px) {
      .grid { grid-template-columns: 1fr; }
    }

    .league-header {
      font-size: 0.85rem;
      font-weight: 600;
      padding: 7px 10px;
      border-radius: 6px;
      color: #fff;
      margin-bottom: 1rem;
    }
    .al-header { background: #1F3864; }
    .nl-header { background: #6B1A1A; }

    .pos-block { margin-bottom: 1.5rem; }
    .pos-label {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 5px;
      padding-bottom: 4px;
      border-bottom: 1px solid #222;
    }

    .player-row {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 4px 0;
      border-bottom: 1px solid #1a1a1a;
    }
    .player-row:last-child { border-bottom: none; }

    .rank {
      font-size: 0.65rem;
      color: #444;
      width: 12px;
      text-align: right;
      flex-shrink: 0;
    }
    .name-col { flex: 1; min-width: 0; }
    .player-name {
      font-size: 0.72rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #ddd;
    }
    .starter .player-name { font-weight: 600; color: #fff; }
    .player-club { font-size: 0.62rem; color: #555; }

    .bars-col {
      width: 108px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .bar-row { display: flex; align-items: center; gap: 4px; }
    .bar-track {
      flex: 1;
      height: 5px;
      background: #1e1e1e;
      border-radius: 2px;
      overflow: hidden;
    }
    .bar-fill { height: 5px; border-radius: 2px; }
    .bar-val {
      font-size: 0.62rem;
      color: #555;
      width: 28px;
      text-align: right;
      flex-shrink: 0;

      border-radius: 3px;
      flex-shrink: 0;
      color: #fff;
    }
    .al-badge { background: #1F3864; }
    .nl-badge { background: #6B1A1A; }
    .star-spacer { width: 18px; flex-shrink: 0; }

    .updated {
      text-align: center;
      font-size: 0.7rem;
      color: #444;
      margin-top: 2.5rem;
    }
  </style>
</head>

const ALL_WAR = DATA.map(d => d[5]);
let MAX_WAR = Math.max(...ALL_WAR);
let MIN_WAR = Math.min(...ALL_WAR);
let WAR_RANGE = MAX_WAR - MIN_WAR;

function warBarColor(w) {
  const t = Math.max(0, Math.min(1, (w - MIN_WAR) / WAR_RANGE));
  const r = Math.round(226 + (59  - 226) * t);
  const g = Math.round(75  + (153 - 75)  * t);
  const b = Math.round(74  + (17  - 74)  * t);
  return `rgb(${r},${g},${b})`;
}

function warTextColor(w) {
  if (w >= 3.0) return '#7ac44e';
  if (w >= 1.5) return '#6aabf7';
  if (w >= 0)   return '#666';
  return '#e06060';
}

function fmtVotes(v) {
  if (v >= 1000000) return (v / 1000000).toFixed(1) + 'M';
  return Math.round(v / 1000) + 'K';
}

function buildLeague(lg, colEl) {
  const lgData = DATA.filter(d => d[0] === lg);
  const isAL = lg === 'AL';
  const badgeClass = isAL ? 'al-badge' : 'nl-badge';

  POS_ORDER.forEach(pos => {
    const rows = lgData.filter(d => d[1] === pos);
    if (!rows.length) return;

    const maxVotes = Math.max(...rows.map(r => r[4]));
    const starCount = pos === 'OF' ? 3 : 1;

    const block = document.createElement('div');
    block.className = 'pos-block';

    const lbl = document.createElement('div');
    lbl.className = 'pos-label';
    lbl.textContent = POS_LABELS[pos];
    block.appendChild(lbl);

    rows.forEach((r, i) => {
      const [, , name, club, votes, war] = r;
      const isStarter = i < starCount;
      const votePct = Math.round((votes / maxVotes) * 100);
      const warBarPct = Math.max(0, Math.round(((war - MIN_WAR) / WAR_RANGE) * 100));

      const row = document.createElement('div');
      row.className = 'player-row' + (isStarter ? ' starter' : '');
      row.innerHTML = `
        <span class="rank">${i + 1}</span>
        <div class="name-col">
          <div class="player-name">${name}</div>
          <div class="player-club">${club}</div>
        </div>
        <div class="bars-col">
          <div class="bar-row">
            <div class="bar-track"><div class="bar-fill" style="width:${votePct}%;background:#378ADD;"></div></div>
            <span class="bar-val">${fmtVotes(votes)}</span>
          </div>
          <div class="bar-row">
            <div class="bar-track"><div class="bar-fill" style="width:${warBarPct}%;background:${warBarColor(war)};"></div></div>
            <span class="war-val" style="color:${warTextColor(war)};">${war.toFixed(1)}</span>
          </div>
        </div>
        ${isStarter
          ? `<span class="star-badge ${badgeClass}">★</span>`
          : `<span class="star-spacer"></span>`}
      `;
      block.appendChild(row);
    });

    colEl.appendChild(block);
  });
}

// Normalize player names for fuzzy matching (strip accents, lowercase)
function normName(s) {
  return s.normalize('NFD').replace(/[̀-ͯ]/g, '').toLowerCase().trim();
}

async function fetchLiveWAR() {
  const FG_PROXY = 'https://fg-proxy.vercel.app';
  const params = new URLSearchParams({
    pos: 'all', stats: 'bat', lg: 'all', qual: '0',
    season: '2026', season1: '2026', ind: '0', team: '0',
    sortstat: 'WAR', sortdir: 'default', pageitems: '500', pagenum: '1',
  });
  const res = await fetch(`${FG_PROXY}/api/fangraphs?${params}`);
  if (!res.ok) throw new Error(`fg-proxy ${res.status}`);
  const json = await res.json();
  // Build name → WAR lookup
  const lookup = new Map();
  for (const p of (json.data ?? [])) {
    if (p.PlayerName != null && p.WAR != null) {
      lookup.set(normName(p.PlayerName), parseFloat(p.WAR));
    }
  }
  return { lookup, fetchedAt: new Date(res.headers.get('Date') || Date.now()) };
}

function fmtDate(d) {
  return d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
}

async function init() {
  let warLookup = null;

  try {
    const { lookup, fetchedAt } = await fetchLiveWAR();
    warLookup = lookup;
    // Patch DATA in place with live WAR values
    for (const row of DATA) {
      const live = lookup.get(normName(row[2]));
      if (live !== undefined) row[5] = live;
    }
    // Recompute WAR range with live values
    const allWar = DATA.map(d => d[5]);
    MAX_WAR = Math.max(...allWar);
    MIN_WAR = Math.min(...allWar);
    WAR_RANGE = MAX_WAR - MIN_WAR;
    document.getElementById('fwar-date').textContent = fmtDate(fetchedAt);
  } catch (e) {
    console.warn('fWAR fetch failed, using cached values:', e.message);
    document.getElementById('fwar-date').textContent = 'June 15, 2026 (cached)';
  }

  buildLeague('AL', document.getElementById('al-col'));
  buildLeague('NL', document.getElementById('nl-col'));
}

init();
</script>

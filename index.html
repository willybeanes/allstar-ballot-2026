// Pre-normalize ballot names into Sets for fast lookup
let BALLOT_NAMES = {};

// Honorable mentions: pos|league → [{name, club, war, mlbId}]
const honorableMap = new Map();

// All FG player data stored after live fetch for HM use
let allFGPlayers = [];

// Map DATA team names → FanGraphs team abbreviations
const TEAM_FG = {
  'Angels':'LAA','Astros':'HOU','Athletics':'ATH','Blue Jays':'TOR',
  'Braves':'ATL','Brewers':'MIL','Cardinals':'STL','Cubs':'CHC',
  'D-backs':'ARI','Dodgers':'LAD','Giants':'SFG','Guardians':'CLE',
  'Mariners':'SEA','Marlins':'MIA','Mets':'NYM','Nationals':'WSN',
  'Orioles':'BAL','Padres':'SDP','Phillies':'PHI','Pirates':'PIT',
  'Rangers':'TEX','Rays':'TBR','Red Sox':'BOS','Reds':'CIN',
  'Rockies':'COL','Royals':'KCR','Tigers':'DET','Twins':'MIN',
  'White Sox':'CWS','Yankees':'NYY',
};

function lookupKey(name, team) {
  return normName(name) + '|' + (TEAM_FG[team] || team).toLowerCase();
}

function warBarColor(w, minW, maxW) {
  const range = maxW - minW || 1;
  const t = Math.max(0, Math.min(1, (w - minW) / range));
  const r = Math.round(220 + (22  - 220) * t);
  const g = Math.round(38  + (163 - 38)  * t);
  const b = Math.round(38  + (74  - 38)  * t);
  return `rgb(${r},${g},${b})`;
}

function warTextColor(w, minW, maxW) {
  const range = maxW - minW || 1;
  const t = Math.max(0, Math.min(1, (w - minW) / range));
  const r = Math.round(220 + (22  - 220) * t);
  const g = Math.round(38  + (163 - 38)  * t);
  const b = Math.round(38  + (74  - 38)  * t);
  return `rgb(${r},${g},${b})`;
}

function fmtVotes(v) {
  if (v >= 1_000_000) return (v / 1_000_000).toFixed(1) + 'M';
  return Math.round(v / 1000) + 'K';
}

function initials(name) {
  return name.split(' ').map(p => p[0]).join('').slice(0, 2).toUpperCase();
}

function headshotUrl(mlbId) {
  return `${FG_PROXY}/api/headshot?id=${mlbId}`;
}

function buildLeague(lg, colEl) {
  const lgData = DATA.filter(d => d[0] === lg);

  POS_ORDER.forEach(pos => {
    const rows = lgData.filter(d => d[1] === pos);
    if (!rows.length) return;

    const maxVotes = Math.max(...rows.map(r => r[4]));
    const starCount = pos === 'OF' ? 3 : 1;
    const posWars = rows.map(r => r[5]);
    const posMinWar = Math.min(...posWars);
    const posMaxWar = Math.max(...posWars);

    const card = document.createElement('div');
    card.className = 'pos-card';

    const lbl = document.createElement('div');
    lbl.className = 'pos-label';
    lbl.textContent = POS_LABELS[pos];
    card.appendChild(lbl);

    rows.forEach((r, i) => {
      const [, , name, club, votes, war] = r;
      const isStarter = i < starCount;
      const votePct = Math.round((votes / maxVotes) * 100);
      const posWarRange = posMaxWar - posMinWar || 1;
      const warBarPct = Math.max(0, Math.round(((war - posMinWar) / posWarRange) * 100));
      const mlbId = mlbIdMap.get(normName(name) + '|' + club);

      const row = document.createElement('div');
      row.className = 'player-row' + (isStarter ? ' starter' : '');

      // Headshot
      const hsWrap = document.createElement('div');
      hsWrap.className = 'headshot-wrap';
      if (mlbId) {
        const img = document.createElement('img');
        img.src = headshotUrl(mlbId);
        img.alt = name;
        img.loading = 'lazy';
        img.onerror = () => {
          img.remove();
          const init = document.createElement('span');
          init.className = 'headshot-initials';
          init.textContent = initials(name);
          hsWrap.appendChild(init);
        };
        hsWrap.appendChild(img);
      } else {
        const init = document.createElement('span');
        init.className = 'headshot-initials';
        init.textContent = initials(name);
        hsWrap.appendChild(init);
      }

      row.innerHTML = `
        <span class="rank">${i + 1}</span>
        <div class="name-col">
          <div class="player-name">${name}</div>
          <div class="player-club">${club}</div>
        </div>
        <div class="bars-col">
          <div class="bar-row">
            <div class="bar-track"><div class="bar-fill" style="width:${votePct}%;background:#2563eb;"></div></div>
            <span class="bar-val">${fmtVotes(votes)}</span>
          </div>
          <div class="bar-row">
            <div class="bar-track"><div class="bar-fill" style="width:${warBarPct}%;background:${warBarColor(war, posMinWar, posMaxWar)};"></div></div>
            <span class="war-val" style="color:${warTextColor(war, posMinWar, posMaxWar)};">${war.toFixed(1)}</span>
          </div>
        </div>
        ${isStarter ? `<span class="star-badge">★</span>` : `<span class="star-spacer"></span>`}
      `;

      // Prepend headshot before rank
      row.insertBefore(hsWrap, row.firstChild);
      card.appendChild(row);
    });

    // Honorable mentions
    const hm = honorableMap.get(`${pos}|${lg}`);
    if (hm?.length) {
      const hmSection = document.createElement('div');
      hmSection.className = 'hm-section';

      const hmLabel = document.createElement('div');
      hmLabel.className = 'hm-label';
      hmLabel.textContent = 'Top fWAR — on ballot, not in top 10';
      hmSection.appendChild(hmLabel);

      for (const p of hm) {
        const hmRow = document.createElement('div');
        hmRow.className = 'hm-row';

        const hsWrap = document.createElement('div');
        hsWrap.className = 'hm-headshot';
        if (p.mlbId) {
          const img = document.createElement('img');
          img.src = headshotUrl(p.mlbId);
          img.alt = p.name;
          img.loading = 'lazy';
          img.onerror = () => {
            img.remove();
            const init = document.createElement('span');
            init.className = 'hm-initials';
            init.textContent = initials(p.name);
            hsWrap.appendChild(init);
          };
          hsWrap.appendChild(img);
        } else {
          const init = document.createElement('span');
          init.className = 'hm-initials';
          init.textContent = initials(p.name);
          hsWrap.appendChild(init);
        }

        const warColor = warTextColor(p.war, Math.min(...hm.map(x => x.war)), Math.max(...hm.map(x => x.war)));

        hmRow.innerHTML = `
          <div class="hm-name-col">
            <div class="hm-name">${p.name}</div>
            <div class="hm-club">${p.club}</div>
          </div>
          <span class="hm-war" style="color:${warColor};">${p.war.toFixed(1)}</span>
        `;
        hmRow.insertBefore(hsWrap, hmRow.firstChild);
        hmSection.appendChild(hmRow);
      }

      card.appendChild(hmSection);
    }

    colEl.appendChild(card);
  });
}

function fmtDate(d) {
  return d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
}

function buildHonorableMentions() {
  // Pre-normalize ballot names per position (done once, after normName is defined)
  for (const [pos, names] of Object.entries(BALLOT_RAW)) {
    BALLOT_NAMES[pos] = new Set(names.map(normName));
  }

  // Top-10 vote-getters already shown in DATA — exclude them
  const top10Set = new Set(DATA.map(row => `${row[1]}|${row[0]}|${normName(row[2])}`));

  for (const pos of POS_ORDER) {
    const ballotForPos = BALLOT_NAMES[pos];
    if (!ballotForPos) continue;

    const byLeague = { AL: [], NL: [] };
    for (const p of allFGPlayers) {
      const name = p.PlayerName || '';
      const fgTeam = (p.Team ?? '').replace(/<[^>]+>/g, '').trim();
      const league = TEAM_LEAGUE[fgTeam];
      if (!league) continue;
      if (!ballotForPos.has(normName(name))) continue;
      if (top10Set.has(`${pos}|${league}|${normName(name)}`)) continue;
      const war = parseFloat(p.WAR ?? 0);
      if (isNaN(war)) continue;
      byLeague[league].push({
        name,
        club: fgTeam,
        war,
        mlbId: p.xMLBAMID ?? p.MLBAMID ?? null,
      });
    }

    for (const lg of ['AL', 'NL']) {
      const top = byLeague[lg].sort((a, b) => b.war - a.war).slice(0, 3);
      if (top.length) honorableMap.set(`${pos}|${lg}`, top);
    }
  }
}

async function fetchLiveWAR() {
  const params = new URLSearchParams({
    pos: 'all', stats: 'bat', lg: 'all', qual: '0',
    season: '2026', season1: '2026', ind: '0', team: '0',
    sortstat: 'WAR', sortdir: 'default', pageitems: '1500', pagenum: '1',
  });
  const res = await fetch(`${FG_PROXY}/api/fangraphs?${params}`);
  if (!res.ok) throw new Error(`fg-proxy ${res.status}`);
  const json = await res.json();
  allFGPlayers = json.data ?? [];
  const lookup = new Map();
  for (const p of allFGPlayers) {
    if (!p.PlayerName) continue;
    const entry = { war: parseFloat(p.WAR ?? 0), mlbId: p.xMLBAMID ?? p.MLBAMID ?? null };
    // Store by both name|team (preferred) and name-only fallback
    const fgTeam = (p.Team ?? '').replace(/<[^>]+>/g, '').trim();
    const teamKey = lookupKey(p.PlayerName, fgTeam);
    const nameKey = normName(p.PlayerName);
    lookup.set(teamKey, entry);
    if (!lookup.has(nameKey)) lookup.set(nameKey, entry); // first occurrence wins for name-only
  }
  return { lookup, fetchedAt: new Date(res.headers.get('Date') || Date.now()) };
}

async function init() {
  try {
    const { lookup, fetchedAt } = await fetchLiveWAR();

    for (const row of DATA) {
      // Prefer name|team match to avoid same-name collisions (e.g. two Max Muncys)
      const live = lookup.get(lookupKey(row[2], row[3])) ?? lookup.get(normName(row[2]));
      if (live) {
        row[5] = live.war;
        if (live.mlbId) mlbIdMap.set(normName(row[2]) + '|' + row[3], live.mlbId);
      }
    }

    // Recompute range with live values
    ALL_WAR = DATA.map(d => d[5]);
    MAX_WAR = Math.max(...ALL_WAR);
    MIN_WAR = Math.min(...ALL_WAR);
    WAR_RANGE = MAX_WAR - MIN_WAR;

    document.getElementById('fwar-date').textContent = fmtDate(fetchedAt);
  } catch (e) {
    console.warn('fWAR fetch failed, using fallback values:', e.message);
    document.getElementById('fwar-date').textContent = 'June 15, 2026 (cached)';
  }

  buildHonorableMentions();

  buildLeague('AL', document.getElementById('al-col'));
  buildLeague('NL', document.getElementById('nl-col'));
}

init();
